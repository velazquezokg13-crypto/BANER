                    </div>
                </div>
            </a>
        </div>

        <!-- Slide 2 -->
        <div class="swiper-slide">
            <a href="otro-enlace.html" class="banner-link">
                <img src="banner/orgulloso.png" alt="Oferta 2">
                <div class="banner-content">
                    <div class="text-box">
                        <h1>Orgullosamente PREFECO</h1>
                    </div>
                </div>

        </div>
        <!-- Slide 3 -->

    </div>

</div>
        
      <!-- Swiper JS -->
<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<script>
    const swiper = new Swiper('.mainBanner', {
        loop: true,               // Infinito
        spaceBetween: 0,          // Sin espacio entre slides
        autoplay: {
            delay: 4000,          // Cambia cada 4 segundos
            disableOnInteraction: false,
        },
        pagination: {
            el: '.swiper-pagination',
            clickable: true,
        },
        navigation: {
            nextEl: '.swiper-button-next',
            prevEl: '.swiper-button-prev',
        },
        // Efecto de transición elegante
        speed: 800,
    });
</script>
<style>
    /*swiper*/
/* --- ESTILOS DEL BANNER --- */
.mainBanner {
    width: 100%;
    height: 450px; /* Altura ideal tipo e-commerce */
    position: relative;
}

.mainBanner .swiper-slide {
    position: relative;
    overflow: hidden;
}

.mainBanner img {
    width: 100%;
    height: 100%;
    object-fit: cover; /* Ajuste perfecto de la imagen */
    object-position: center;
}

/* Capa de contenido sobre la imagen */
.banner-content {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center; /* Centrado vertical */
    padding-left: 10%; /* Alineado a la izquierda como ML */
    background: linear-gradient(to right, rgba(0,0,0,0.4), transparent); /* Degradado para legibilidad */
}

.text-box {
    color: white;
    max-width: 500px;
}

.text-box span {
    font-size: 0.9rem;
    font-weight: 600;
    letter-spacing: 2px;
    color: var(--color-primario);
}

.text-box h1 {
    font-size: 3rem;
    margin: 10px 0 20px;
    line-height: 1.1;
}

.btn-comprar {
    padding: 12px 30px;
    background: var(--color-primario);
    border: none;
    color: white;
    font-weight: 600;
    border-radius: 5px;
    cursor: pointer;
    transition: transform 0.3s;
}

.btn-comprar:hover {
    transform: scale(1.05);
}

/* --- RESPONSIVE --- */
@media (max-width: 768px) {
    .mainBanner { height: 300px; }
    .text-box h1 { font-size: 1.8rem; }
    .banner-content { padding-left: 5%; }
}
/* --- ESTILOS DEL BANNER --- */
.mainBanner {
    width: 100%;
    height: 450px;
    position: relative;
}

/* Hace que todo el slide sea clickable */
.banner-link {
    text-decoration: none;

    position: relative;
}

.mainBanner .swiper-slide {
    position: relative;
    overflow: hidden;
}

.mainBanner img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
    transition: transform 0.5s ease; /* Efecto zoom opcional */
}

/* Zoom suave al pasar el mouse por el banner */
.banner-link:hover img {
    transform: scale(1.05);
}

/* Capa de contenido: Alineada ABAJO a la IZQUIERDA */
.banner-content {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: flex-end; /* Mueve el texto al fondo */
    justify-content: flex-start; /* Mueve el texto a la izquierda */
    padding: 40px 5%; /* Espacio desde los bordes */
    /* Degradado oscuro desde abajo para que el texto blanco se lea perfecto */
    background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 40%);
    box-sizing: border-box;
}

    color: white;
    max-width: 80%;
}

.text-box h1 {
    font-size: 2.5rem;

}

</style>
